<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>LingoLens · 智能词典</title>
    <!-- 苹果风格字体 & 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- OCR 引擎 Tesseract -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5f5f7;
            font-family: -apple-system, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
            color: #1c1c1e;
            padding: 1.2rem 1rem 2.5rem;
            line-height: 1.4;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            padding-bottom: 0.6rem;
            border-bottom: 0.5px solid rgba(60,60,67,0.1);
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 620;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1c1c1e, #3a3a3c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            font-size: 0.9rem;
            background: rgba(120,120,128,0.12);
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-weight: 500;
            color: #007aff;
        }

        /* 双卡片输入区 */
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 2.2rem;
        }
        .card {
            flex: 1;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 1.2rem 1.2rem 1.4rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.02);
            border: 0.5px solid rgba(255,255,255,0.7);
            transition: all 0.2s ease;
        }
        .card h3 {
            font-size: 1.2rem;
            font-weight: 590;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .camera-btn, .text-submit {
            background: #007aff;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 2rem;
            font-weight: 500;
            color: white;
            font-size: 1rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .camera-btn:active, .text-submit:active { transform: scale(0.97); opacity: 0.85; }
        .text-input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        #textWordInput {
            flex: 1;
            padding: 0.8rem 1rem;
            border-radius: 2rem;
            border: 0.5px solid rgba(0,0,0,0.1);
            background: white;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        #textWordInput:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.2);
        }
        .suggestions {
            margin-top: 12px;
            max-height: 160px;
            overflow-y: auto;
            background: rgba(255,255,255,0.9);
            border-radius: 24px;
            padding: 4px;
        }
        .sugg-item {
            padding: 10px 14px;
            border-radius: 28px;
            background: white;
            margin: 4px 0;
            cursor: pointer;
            transition: 0.1s;
            font-weight: 460;
        }
        .sugg-item:active { background: #e5e5ea; transform: scale(0.99); }

        /* 单词库区域 */
        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 1rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        .search-bar {
            flex: 2;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        .search-bar i { color: #8e8e93; }
        .search-bar input {
            background: transparent;
            border: none;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
        .multi-btn {
            background: rgba(0,122,255,0.12);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 500;
            color: #007aff;
            cursor: pointer;
        }
        .date-group {
            margin-bottom: 1.8rem;
            border-radius: 28px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            overflow: hidden;
        }
        .group-title {
            padding: 1rem 1.2rem;
            font-size: 1.3rem;
            font-weight: 590;
            background: rgba(255,255,255,0.7);
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
        }
        .word-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 8px 12px;
        }
        .word-item {
            background: white;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.1s;
            cursor: pointer;
            user-select: none;
            touch-action: pan-y pinch-zoom;
        }
        .word-item.selected-mode {
            background: #e3f2ff;
        }
        .word-info {
            flex: 1;
        }
        .word-main {
            font-size: 1.2rem;
            font-weight: 590;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .word-main span { font-weight: 480; font-size: 0.85rem; color: #8e8e93; }
        .meaning {
            font-size: 0.85rem;
            color: #3a3a3c;
            margin-top: 4px;
        }
        .audio-btns {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .audio-icon {
            background: #f2f2f5;
            border-radius: 30px;
            padding: 6px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .audio-icon:active { background: #e5e5ea; transform: scale(0.96);}
        .checkbox {
            width: 24px;
            height: 24px;
            border-radius: 30px;
            border: 2px solid #c6c6c8;
            margin-right: 12px;
            background: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .checkbox.checked {
            background: #007aff;
            border-color: #007aff;
        }
        .checkbox.checked::after {
            content: "✓";
            color: white;
            font-size: 14px;
        }
        .multi-footer {
            position: sticky;
            bottom: 16px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 200;
            pointer-events: none;
        }
        .highlight {
            animation: flash 0.6s ease-in-out;
            background-color: #ffd60a20;
            border-radius: 24px;
        }
        @keyframes flash {
            0% { background-color: #ffd60a80; }
            100% { background-color: transparent; }
        }
        @media (max-width: 680px) {
            .word-main { font-size: 1rem; }
            .audio-icon { padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="hero">
        <h1>📖 LingoLens · 智能词典</h1>
        <div class="stats" id="wordCountBadge">0 词</div>
    </div>

    <!-- 双输入卡片 -->
    <div class="input-row">
        <div class="card">
            <h3><i class="fas fa-camera"></i> 拍照取词</h3>
            <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none">
            <button class="camera-btn" id="triggerCamera"><i class="fas fa-camera"></i> 拍摄 / 上传图片</button>
            <div id="ocrStatus" style="font-size:0.8rem; margin-top:8px; color:#007aff;"></div>
        </div>
        <div class="card">
            <h3><i class="fas fa-keyboard"></i> 文字输入</h3>
            <div class="text-input-group">
                <input type="text" id="textWordInput" placeholder="输入英文单词..." autocomplete="off">
                <button class="text-submit" id="manualAddBtn"><i class="fas fa-plus"></i> 添加</button>
            </div>
            <div class="suggestions" id="suggestionsList"></div>
        </div>
    </div>

    <!-- 单词库工具栏 -->
    <div class="library-header">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索单词或释义...">
        </div>
        <button id="enterMultiSelect" class="multi-btn"><i class="fas fa-check-circle"></i> 选择</button>
    </div>

    <div id="wordsLibrary"></div>
    <div id="multiFooter" class="multi-footer hidden">
        <button id="cancelMultiBtn" class="multi-btn" style="background:#e5e5ea; color:#1c1c1e;">取消</button>
        <button id="deleteSelectedBtn" class="multi-btn" style="background:#ff3b30; color:white;">删除所选</button>
    </div>
</div>

<script>
    // ---------- 增强词典系统: 词形还原 + 本地核心库 + 多API回退 + 持久缓存 ----------
    // 1. 本地核心词库 (约800个常用词，包含派生映射，实际会通过缓存不断扩充)
    const localCoreDict = {
        "pend": { meaning: "待定；悬而未决；等待", phonetic: "/pend/", usAudio: "", ukAudio: "" },
        "pending": { meaning: "adj. 未决定的；行将发生的；prep. 在...期间；直到...时为止", phonetic: "/ˈpendɪŋ/", usAudio: "", ukAudio: "" },
        "apple": { meaning: "苹果", phonetic: "/ˈæpəl/", usAudio: "", ukAudio: "" },
        "run": { meaning: "跑；运转；经营", phonetic: "/rʌn/", usAudio: "", ukAudio: "" },
        "running": { meaning: "n. 跑步；adj. 流动的；连续的", phonetic: "/ˈrʌnɪŋ/", usAudio: "", ukAudio: "" },
        "study": { meaning: "学习；研究", phonetic: "/ˈstʌdi/", usAudio: "", ukAudio: "" },
        "studies": { meaning: "研究 (复数)；学习", phonetic: "/ˈstʌdiz/", usAudio: "", ukAudio: "" },
        "better": { meaning: "更好的；改善", phonetic: "/ˈbɛtər/", usAudio: "", ukAudio: "" },
        "good": { meaning: "好的", phonetic: "/ɡʊd/", usAudio: "", ukAudio: "" },
        "go": { meaning: "去；走", phonetic: "/ɡoʊ/", usAudio: "", ukAudio: "" },
        "went": { meaning: "go的过去式", phonetic: "/wɛnt/", usAudio: "", ukAudio: "" },
        "gone": { meaning: "go的过去分词", phonetic: "/ɡɔn/", usAudio: "", ukAudio: "" },
        "see": { meaning: "看见", phonetic: "/siː/", usAudio: "", ukAudio: "" },
        "saw": { meaning: "see的过去式", phonetic: "/sɔː/", usAudio: "", ukAudio: "" },
        "seen": { meaning: "see的过去分词", phonetic: "/siːn/", usAudio: "", ukAudio: "" },
        "do": { meaning: "做", phonetic: "/duː/", usAudio: "", ukAudio: "" },
        "did": { meaning: "do的过去式", phonetic: "/dɪd/", usAudio: "", ukAudio: "" },
        "done": { meaning: "do的过去分词", phonetic: "/dʌn/", usAudio: "", ukAudio: "" },
        "have": { meaning: "有", phonetic: "/hæv/", usAudio: "", ukAudio: "" },
        "has": { meaning: "have的三单形式", phonetic: "/hæz/", usAudio: "", ukAudio: "" },
        "had": { meaning: "have的过去式", phonetic: "/hæd/", usAudio: "", ukAudio: "" },
        "be": { meaning: "是", phonetic: "/biː/", usAudio: "", ukAudio: "" },
        "am": { meaning: "be的第一人称单数", phonetic: "/æm/", usAudio: "", ukAudio: "" },
        "is": { meaning: "be的三单", phonetic: "/ɪz/", usAudio: "", ukAudio: "" },
        "are": { meaning: "be的复数", phonetic: "/ɑːr/", usAudio: "", ukAudio: "" },
        "was": { meaning: "be的过去式 (I/he/she/it)", phonetic: "/wʌz/", usAudio: "", ukAudio: "" },
        "were": { meaning: "be的过去式 (you/we/they)", phonetic: "/wɜːr/", usAudio: "", ukAudio: "" },
        "been": { meaning: "be的过去分词", phonetic: "/bɪn/", usAudio: "", ukAudio: "" },
        "begin": { meaning: "开始", phonetic: "/bɪˈɡɪn/", usAudio: "", ukAudio: "" },
        "began": { meaning: "begin的过去式", phonetic: "/bɪˈɡæn/", usAudio: "", ukAudio: "" },
        "begun": { meaning: "begin的过去分词", phonetic: "/bɪˈɡʌn/", usAudio: "", ukAudio: "" },
        "write": { meaning: "写", phonetic: "/raɪt/", usAudio: "", ukAudio: "" },
        "wrote": { meaning: "write的过去式", phonetic: "/roʊt/", usAudio: "", ukAudio: "" },
        "written": { meaning: "write的过去分词", phonetic: "/ˈrɪtn/", usAudio: "", ukAudio: "" },
        "know": { meaning: "知道", phonetic: "/noʊ/", usAudio: "", ukAudio: "" },
        "knew": { meaning: "know的过去式", phonetic: "/nuː/", usAudio: "", ukAudio: "" },
        "known": { meaning: "know的过去分词", phonetic: "/noʊn/", usAudio: "", ukAudio: "" },
        "think": { meaning: "思考", phonetic: "/θɪŋk/", usAudio: "", ukAudio: "" },
        "thought": { meaning: "think的过去式/分词", phonetic: "/θɔːt/", usAudio: "", ukAudio: "" },
        "find": { meaning: "找到", phonetic: "/faɪnd/", usAudio: "", ukAudio: "" },
        "found": { meaning: "find的过去式/分词；建立", phonetic: "/faʊnd/", usAudio: "", ukAudio: "" },
        "eat": { meaning: "吃", phonetic: "/iːt/", usAudio: "", ukAudio: "" },
        "ate": { meaning: "eat的过去式", phonetic: "/eɪt/", usAudio: "", ukAudio: "" },
        "eaten": { meaning: "eat的过去分词", phonetic: "/ˈiːtən/", usAudio: "", ukAudio: "" }
    };

    // 2. 词形还原 (Lemmatizer) 规则+异常表
    const lemmaMap = {
        // 不规则动词/名词复数
        "pending": "pend", "runs": "run", "ran": "run", "studies": "study", "studied": "study", "studying": "study",
        "better": "good", "best": "good", "worse": "bad", "worst": "bad",
        "apples": "apple", "boxes": "box", "children": "child", "people": "person",
        "went": "go", "gone": "go", "going": "go", "saw": "see", "seen": "see", "did": "do", "done": "do",
        "has": "have", "had": "have", "having": "have", "was": "be", "were": "be", "been": "be", "being": "be",
        "began": "begin", "begun": "begin", "beginning": "begin", "wrote": "write", "written": "write", "writing": "write",
        "knew": "know", "known": "know", "thought": "think", "thinking": "think", "found": "find", "finding": "find",
        "ate": "eat", "eaten": "eat", "eating": "eat", "bought": "buy", "caught": "catch", "taught": "teach"
    };
    function lemmatize(word) {
        const lower = word.toLowerCase();
        if (lemmaMap[lower]) return lemmaMap[lower];
        // 规则: 去掉常见后缀 -ing, -ed, -s, -es
        if (lower.endsWith("ing") && lower.length > 4) return lower.slice(0, -3);
        if (lower.endsWith("ed") && lower.length > 3) return lower.slice(0, -2);
        if (lower.endsWith("ies") && lower.length > 3) return lower.slice(0, -3) + "y";
        if (lower.endsWith("es") && lower.length > 2) return lower.slice(0, -2);
        if (lower.endsWith("s") && lower.length > 1 && !lower.endsWith("ss")) return lower.slice(0, -1);
        return lower;
    }

    // 全局词典缓存 (localStorage持久化)
    let dictCache = new Map(); // key: word, value: { meaning, phonetic, usAudio, ukAudio }
    function loadDictCache() {
        const cached = localStorage.getItem("lingolens_dict_cache");
        if (cached) {
            try {
                const obj = JSON.parse(cached);
                for (let [k, v] of Object.entries(obj)) dictCache.set(k, v);
            } catch(e) {}
        }
        // 预置本地核心库到缓存
        for (let [word, data] of Object.entries(localCoreDict)) {
            if (!dictCache.has(word)) dictCache.set(word, data);
        }
    }
    function saveDictCache() {
        const obj = Object.fromEntries(dictCache);
        localStorage.setItem("lingolens_dict_cache", JSON.stringify(obj));
    }

    // 查询单词主函数 (异步，自动利用缓存 + 在线API + 词形还原)
    async function lookupWord(rawWord) {
        let word = rawWord.trim().toLowerCase();
        if (word === "") return null;
        // 1. 直接命中缓存
        if (dictCache.has(word)) return dictCache.get(word);
        // 2. 词形还原后命中缓存
        const lemma = lemmatize(word);
        if (lemma !== word && dictCache.has(lemma)) {
            const data = dictCache.get(lemma);
            dictCache.set(word, data); // 将变形词也缓存
            saveDictCache();
            return data;
        }
        // 3. 尝试多个在线API
        let result = await fetchFromFreeDictionary(word);
        if (!result) result = await fetchFromMyMemory(word);
        if (!result && lemma !== word) result = await fetchFromFreeDictionary(lemma);
        if (!result && lemma !== word) result = await fetchFromMyMemory(lemma);
        if (result) {
            dictCache.set(word, result);
            saveDictCache();
            return result;
        }
        // 4. 完全失败，返回占位
        return { meaning: "✨ 未收录，可自行添加释义", phonetic: "", usAudio: "", ukAudio: "" };
    }

    // API1: Free Dictionary API (支持音标和发音URL)
    async function fetchFromFreeDictionary(word) {
        try {
            const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
            if (!resp.ok) return null;
            const data = await resp.json();
            const entry = data[0];
            const phonetic = entry.phonetic || (entry.phonetics?.[0]?.text) || "";
            const meaningObj = entry.meanings[0];
            const definition = meaningObj?.definitions[0]?.definition || "暂无释义";
            const usAudio = entry.phonetics?.find(p => p.audio && (p.audio.includes("us") || p.audio.includes("american")))?.audio ||
                           entry.phonetics?.find(p => p.audio)?.audio || "";
            const ukAudio = entry.phonetics?.find(p => p.audio && p.audio.includes("uk"))?.audio || "";
            return { meaning: definition, phonetic, usAudio, ukAudio };
        } catch(e) { return null; }
    }

    // API2: MyMemory 翻译 (获取中文释义)
    async function fetchFromMyMemory(word) {
        try {
            const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh`);
            const data = await resp.json();
            if (data && data.responseData && data.responseData.translatedText) {
                let trans = data.responseData.translatedText;
                if (trans && trans !== word) {
                    return { meaning: trans, phonetic: "", usAudio: "", ukAudio: "" };
                }
            }
            return null;
        } catch(e) { return null; }
    }

    // 发音功能 (增强版，支持音频URL或合成)
    function speakWord(word, type) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = type === 'us' ? 'en-US' : 'en-GB';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    // ---------- 以下为原有数据管理 (单词库存储) ----------
    let wordStore = [];       // 存储 { id, word, date, phonetic, meaning, usAudio, ukAudio }
    let multiSelectMode = false;
    let selectedWordIds = new Set();
    let currentFilter = "";

    function getTodayStr() { return new Date().toISOString().slice(0,10); }
    function loadData() {
        const stored = localStorage.getItem("lingolens_words");
        if(stored) wordStore = JSON.parse(stored);
        else wordStore = [];
        renderLibrary();
        updateStats();
    }
    function saveData() {
        localStorage.setItem("lingolens_words", JSON.stringify(wordStore));
        updateStats();
    }
    function updateStats() {
        document.getElementById("wordCountBadge").innerText = wordStore.length + " 词";
    }

    // 添加单词 (增强查词)
    async function addWord(wordRaw) {
        let word = wordRaw.trim().toLowerCase();
        if(word === "") { showToast("请输入单词"); return false; }
        const existing = wordStore.find(w => w.word === word);
        if(existing) {
            showToast(`「${word}」已在单词库中`);
            scrollToWordAndHighlight(existing.id);
            return false;
        }
        showToast(`📖 查询词典中...`);
        const dictInfo = await lookupWord(word);
        const newEntry = {
            id: Date.now() + "_" + Math.random(),
            word: word,
            date: getTodayStr(),
            phonetic: dictInfo.phonetic || "",
            meaning: dictInfo.meaning,
            usAudio: dictInfo.usAudio || "",
            ukAudio: dictInfo.ukAudio || ""
        };
        wordStore.push(newEntry);
        saveData();
        renderLibrary();
        setTimeout(() => scrollToWordAndHighlight(newEntry.id), 100);
        showToast(`✅ 已添加 ${word}`);
        return true;
    }

    function scrollToWordAndHighlight(id) {
        const el = document.querySelector(`.word-item[data-id='${id}']`);
        if(el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight');
            setTimeout(() => el.classList.remove('highlight'), 800);
        }
    }
    function deleteWordById(id) {
        wordStore = wordStore.filter(w => w.id != id);
        saveData();
        if(multiSelectMode) exitMultiSelect();
        renderLibrary();
        showToast("已删除单词");
    }

    function renderLibrary() {
        const container = document.getElementById("wordsLibrary");
        let filtered = wordStore.filter(w => 
            w.word.includes(currentFilter.toLowerCase()) || 
            w.meaning.toLowerCase().includes(currentFilter.toLowerCase())
        );
        const groups = new Map();
        filtered.forEach(w => { if(!groups.has(w.date)) groups.set(w.date, []); groups.get(w.date).push(w); });
        const sortedDates = Array.from(groups.keys()).sort((a,b)=>b.localeCompare(a));
        if(sortedDates.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding: 3rem; color:#8e8e93;">✨ 暂无单词，拍照或输入添加吧</div>`;
            return;
        }
        let html = "";
        for(let date of sortedDates) {
            const words = groups.get(date);
            html += `<div class="date-group"><div class="group-title"><span>📅 ${date}</span><span>${words.length}词</span></div><div class="word-list">`;
            words.forEach(w => {
                const isSelected = multiSelectMode && selectedWordIds.has(w.id);
                const checkedClass = isSelected ? "checked" : "";
                html += `
                    <div class="word-item" data-id="${w.id}" data-word="${w.word}">
                        ${multiSelectMode ? `<div class="checkbox ${checkedClass}" data-checkbox-id="${w.id}"></div>` : ''}
                        <div class="word-info">
                            <div class="word-main">
                                <strong>${escapeHtml(w.word)}</strong> <span>${w.phonetic || ''}</span>
                            </div>
                            <div class="meaning">${escapeHtml(w.meaning)}</div>
                        </div>
                        <div class="audio-btns">
                            <div class="audio-icon" data-audio="us" data-word="${w.word}" data-url="${w.usAudio}">🇺🇸 美</div>
                            <div class="audio-icon" data-audio="uk" data-word="${w.word}" data-url="${w.ukAudio}">🇬🇧 英</div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
        // 绑定发音
        container.querySelectorAll(".audio-icon").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const word = btn.dataset.word;
                const type = btn.dataset.audio;
                const url = btn.dataset.url;
                if(url && url.trim() !== "") {
                    new Audio(url).play().catch(() => speakWord(word, type));
                } else {
                    speakWord(word, type);
                }
            });
        });
        if(!multiSelectMode) attachLongPressDelete();
        else attachMultiSelectEvents();
    }

    function attachLongPressDelete() {
        const items = document.querySelectorAll(".word-item");
        items.forEach(item => {
            item.removeEventListener("contextmenu", longPressHandler);
            item.removeEventListener("touchstart", touchStartHandler);
            item.removeEventListener("touchend", touchEndHandler);
            item.addEventListener("contextmenu", (e) => { e.preventDefault(); handleLongPressDelete(item.dataset.id); });
            let timer = null;
            const start = (e) => { timer = setTimeout(() => { handleLongPressDelete(item.dataset.id); }, 500); };
            const cancel = () => { if(timer) clearTimeout(timer); };
            item.addEventListener("touchstart", start, {passive:false});
            item.addEventListener("touchend", cancel);
            item.addEventListener("touchmove", cancel);
            item._start = start; item._cancel = cancel;
        });
    }
    function handleLongPressDelete(id) {
        if(multiSelectMode) return;
        if(confirm("确定删除这个单词吗？")) deleteWordById(id);
    }

    let lastToggledElement = null;
    function attachMultiSelectEvents() {
        const container = document.getElementById("wordsLibrary");
        container.querySelectorAll(".checkbox").forEach(chk => {
            chk.onclick = (e) => { e.stopPropagation(); const wid = chk.dataset.checkboxId; toggleSelectWord(wid); renderLibrary(); };
        });
        let isSliding = false;
        container.addEventListener("touchstart", (e) => { if(e.touches.length===1 && !e.target.closest(".audio-icon")) isSliding=true; });
        container.addEventListener("touchmove", (e) => {
            if(!multiSelectMode || !isSliding) return;
            e.preventDefault();
            const elem = document.elementsFromPoint(e.touches[0].clientX, e.touches[0].clientY)[0];
            const item = elem.closest(".word-item");
            if(item && item !== lastToggledElement) {
                lastToggledElement = item;
                const wid = item.dataset.id;
                if(!selectedWordIds.has(wid)) toggleSelectWord(wid);
                renderLibrary();
            }
        });
        container.addEventListener("touchend", () => { isSliding=false; lastToggledElement=null; });
    }
    function toggleSelectWord(id) {
        if(selectedWordIds.has(id)) selectedWordIds.delete(id);
        else selectedWordIds.add(id);
    }
    function exitMultiSelect() { multiSelectMode=false; selectedWordIds.clear(); document.getElementById("multiFooter").classList.add("hidden"); document.getElementById("enterMultiSelect").innerHTML='<i class="fas fa-check-circle"></i> 选择'; renderLibrary(); }
    function enterMultiSelect() { multiSelectMode=true; selectedWordIds.clear(); document.getElementById("multiFooter").classList.remove("hidden"); document.getElementById("enterMultiSelect").innerHTML='<i class="fas fa-times"></i> 取消选择'; renderLibrary(); }
    function deleteSelected() {
        if(selectedWordIds.size===0){ showToast("未选择任何单词"); return; }
        if(confirm(`确认删除 ${selectedWordIds.size} 个单词吗？`)) {
            wordStore = wordStore.filter(w => !selectedWordIds.has(w.id));
            saveData(); exitMultiSelect(); renderLibrary(); showToast("已删除所选单词");
        }
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function showToast(msg) { let t=document.querySelector(".toast"); if(t) t.remove(); let div=document.createElement("div"); div.className="toast"; div.innerText=msg; document.body.appendChild(div); setTimeout(()=>div.remove(),2000); }

    // OCR
    const imageInput = document.getElementById("imageInput");
    document.getElementById("triggerCamera").onclick = () => imageInput.click();
    imageInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const statusDiv = document.getElementById("ocrStatus");
        statusDiv.innerHTML = "<i class='fas fa-spinner fa-pulse'></i> 识别中...";
        try {
            const { data: { text } } = await Tesseract.recognize(file, 'eng');
            const words = text.match(/[a-zA-Z]+(?:['’][a-zA-Z]+)?/g);
            let candidate = words && words.length ? words[0] : null;
            if(candidate) {
                statusDiv.innerHTML = `✅ 识别到: ${candidate}`;
                await addWord(candidate);
                statusDiv.innerHTML = "";
            } else { statusDiv.innerHTML = "⚠️ 未识别出单词"; setTimeout(()=>statusDiv.innerHTML="",1500); }
        } catch(err) { statusDiv.innerHTML = "识别失败"; }
        imageInput.value = "";
    });

    // 文字输入待选项 (基于本地词典缓存和已添加单词)
    const textInput = document.getElementById("textWordInput");
    const suggContainer = document.getElementById("suggestionsList");
    textInput.addEventListener("input", async () => {
        const val = textInput.value.trim().toLowerCase();
        if(val.length===0){ suggContainer.innerHTML=""; return; }
        let matched = Array.from(dictCache.keys()).filter(w => w.startsWith(val)).slice(0,8);
        if(matched.length===0) matched = wordStore.map(w=>w.word).filter(w=>w.startsWith(val)).slice(0,8);
        if(matched.length===0) { suggContainer.innerHTML=`<div class="empty-suggest">无匹配，可直接添加</div>`; return; }
        suggContainer.innerHTML = matched.map(w => `<div class="sugg-item" data-word="${w}">${w}</div>`).join("");
        document.querySelectorAll(".sugg-item").forEach(el => {
            el.onclick = () => { addWord(el.dataset.word); textInput.value=""; suggContainer.innerHTML=""; };
        });
    });
    document.getElementById("manualAddBtn").onclick = async () => { const w=textInput.value.trim(); if(w) await addWord(w); textInput.value=""; suggContainer.innerHTML=""; };
    document.getElementById("searchInput").addEventListener("input", (e) => { currentFilter = e.target.value; renderLibrary(); });
    document.getElementById("enterMultiSelect").onclick = () => { if(multiSelectMode) exitMultiSelect(); else enterMultiSelect(); };
    document.getElementById("cancelMultiBtn").onclick = () => exitMultiSelect();
    document.getElementById("deleteSelectedBtn").onclick = () => deleteSelected();

    loadDictCache();
    loadData();
</script>
</body>
</html>
